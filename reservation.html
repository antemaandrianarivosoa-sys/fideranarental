<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Réservation - FIDERANA RENTAL</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="reservation.css">

</head>

<body>

<header>
    <div class="logo">FIDERANA RENTAL</div>

    <nav>
        <a href="accueil.html">Accueil</a>
        <a href="véhicules.html">Nos véhicules</a>
        <a href="reservation.html">Réservation</a>
        <a href="contact.html">Contact</a>
    </nav>
</header>

<div class="container">

    <h1>Réserver un véhicule</h1>

    <div class="form-box">

        <form>

            <input type="text" placeholder="Nom">

            <input type="text" placeholder="Prénom">

            <input type="email" placeholder="Email">

            <input type="tel" placeholder="Téléphone">

            <select>
                <option>Choisir un véhicule</option>
                <option>Toyota Land Cruiser LC79</option>
                <option>Hyundai Galloper</option>
                <option>Mitsubishi Pajero</option>
            </select>

            <select>
                <option>Type de location</option>
                <option>Journalière</option>
                <option>Hebdomadaire</option>
                <option>Mensuelle</option>
            </select>

            <input type="date">

            <input type="date">

            <textarea class="full" placeholder="Informations complémentaires"></textarea>

            <div class="full">
                <button type="submit">Réserver</button>
            </div>

        </form>

    </div>

</div>

<footer>
    © 2026 FIDERANA RENTAL - Tous droits réservés
</footer>

</body>
</html>
